name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  package-and-script-checks:
    name: Package and script checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate Python script syntax
        run: python -m py_compile scripts/*.py

      - name: Verify committed Claude desktop skill package contents
        run: python scripts/verify-skill-package.py

      - name: Rebuild Claude desktop skill package
        run: python scripts/build-skill-package.py

      - name: Verify rebuilt Claude desktop skill package contents
        run: python scripts/verify-skill-package.py

      - name: Verify Codex plugin marketplace and skill copy
        run: python scripts/verify-codex-plugin.py

      - name: Validate Bash script syntax
        run: bash -n scripts/*.sh

      - name: Validate PowerShell script syntax
        shell: pwsh
        run: |
          $hadErrors = $false
          foreach ($script in Get-ChildItem -Path scripts -Filter *.ps1) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($script.FullName, [ref] $tokens, [ref] $errors) | Out-Null
            if ($errors.Count -gt 0) {
              $hadErrors = $true
              Write-Error "PowerShell parse errors in $($script.FullName):"
              $errors | Format-List | Out-String | Write-Error
            }
          }
          if ($hadErrors) {
            exit 1
          }

  publish-release:
    name: Publish release
    needs: package-and-script-checks
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Prepare release metadata
        id: release
        run: python scripts/prepare-github-release.py --notes-file release-notes.md --github-output "$GITHUB_OUTPUT"

      - name: Check whether release already exists
        id: existing_release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        if: steps.existing_release.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: >
          gh release create "$RELEASE_TAG"
          "dist/blindspot-audit.skill#blindspot-audit.skill"
          --target "$GITHUB_SHA"
          --title "$RELEASE_TAG"
          --notes-file release-notes.md
          --latest
