<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blindspot Ledger Triage</title>
  <style>
    :root {
      --bg: #f7f4ee;
      --panel: #fffdf8;
      --ink: #1f1d19;
      --muted: #675f55;
      --line: #ded4c4;
      --accent: #0f766e;
      --accent-soft: #eaf6f3;
      --amber: #a15c07;
      --amber-soft: #fff7ed;
      --blue: #1d4ed8;
      --blue-soft: #eef4ff;
      --danger: #b91c1c;
      --ok: #166534;
      --radius: 8px;
      --shadow: 0 8px 24px rgba(40, 32, 20, 0.08);
      font-family: Segoe UI, system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.55;
    }
    header {
      background: #151a18;
      color: #fffaf0;
      padding: 24px clamp(18px, 4vw, 44px);
    }
    header h1 {
      margin: 0 0 6px;
      font-size: clamp(22px, 3vw, 34px);
      letter-spacing: 0;
    }
    header p { margin: 0; color: #d8d0c2; max-width: 980px; }
    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 22px clamp(14px, 3vw, 32px) 48px;
    }
    .steps {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }
    .step,
    .summary,
    .group,
    .item,
    .submit-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .step { padding: 14px; }
    .step strong { display: block; margin-bottom: 4px; }
    .summary {
      padding: 16px;
      margin-bottom: 18px;
      display: grid;
      gap: 8px;
    }
    .progressbar {
      height: 12px;
      border-radius: 999px;
      background: #e8dfd0;
      overflow: hidden;
    }
    .progressbar > div {
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width 0.2s ease;
    }
    .hint {
      color: var(--muted);
      font-size: 14px;
    }
    .group {
      margin: 18px 0;
      overflow: hidden;
    }
    .group-head {
      padding: 16px;
      border-bottom: 1px solid var(--line);
      background: #fbf7ef;
      display: flex;
      gap: 12px;
      justify-content: space-between;
      align-items: flex-start;
    }
    .group-title { margin: 0 0 4px; font-size: 20px; }
    .group-summary { margin: 0; color: var(--muted); max-width: 820px; }
    .group-actions { flex: 0 0 auto; display: flex; gap: 8px; }
    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 6px;
      padding: 9px 12px;
      cursor: pointer;
      font: inherit;
    }
    button.primary { background: var(--accent); color: white; border-color: var(--accent); }
    button:hover { filter: brightness(0.98); }
    .item {
      margin: 14px;
      padding: 16px;
      box-shadow: none;
    }
    .item + .item { margin-top: 18px; }
    .item h3 {
      margin: 0 0 8px;
      font-size: clamp(18px, 2vw, 24px);
      letter-spacing: 0;
    }
    .ledger-location {
      color: var(--muted);
      font-family: ui-monospace, SFMono-Regular, Consolas, Liberation Mono, monospace;
      font-size: 12px;
      margin: -2px 0 10px;
    }
    .badges { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0 12px; }
    .badge {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px 9px;
      color: var(--muted);
      font-size: 13px;
      background: #fff;
    }
    .badge.recommend {
      color: #075e56;
      background: var(--accent-soft);
      border-color: #9ccdc5;
    }
    .block {
      border-radius: 7px;
      padding: 12px 13px;
      margin: 10px 0;
      border-left: 4px solid var(--accent);
      background: var(--accent-soft);
    }
    .block.ledger {
      border-color: var(--blue);
      background: var(--blue-soft);
    }
    .block.why {
      border-color: var(--amber);
      background: var(--amber-soft);
    }
    .block strong {
      display: block;
      margin-bottom: 4px;
    }
    .decision-question {
      margin: 12px 0 8px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      font-weight: 650;
    }
    .options {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }
    .option {
      display: grid;
      grid-template-columns: 24px minmax(0, 1fr);
      gap: 12px;
      align-items: start;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 12px;
      background: #fff;
      cursor: pointer;
    }
    .option input {
      margin-top: 5px;
      width: 18px;
      height: 18px;
    }
    .option-title {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      font-weight: 750;
      font-size: 17px;
    }
    .recommended-pill {
      color: #075e56;
      background: var(--accent-soft);
      border: 1px solid #9ccdc5;
      border-radius: 999px;
      padding: 1px 8px;
      font-size: 12px;
      font-weight: 650;
    }
    .effect-pill {
      color: #344054;
      background: #f8fafc;
      border: 1px solid #cbd5e1;
      border-radius: 999px;
      padding: 1px 8px;
      font-size: 12px;
      font-weight: 650;
    }
    .option p {
      margin: 6px 0 0;
      color: var(--muted);
    }
    .option.selected {
      outline: 2px solid var(--accent);
      background: #f0fbf8;
    }
    textarea {
      width: 100%;
      min-height: 76px;
      margin-top: 12px;
      padding: 10px;
      resize: vertical;
      border-radius: 6px;
      border: 1px solid var(--line);
      font: inherit;
      background: #fff;
    }
    .submit-panel {
      padding: 16px;
      margin-top: 22px;
      display: grid;
      gap: 10px;
    }
    .status { color: var(--muted); }
    .status.good { color: var(--ok); }
    .status.bad { color: var(--danger); }
    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: #151a18;
      color: #fffaf0;
      padding: 12px;
      border-radius: 6px;
      max-height: 260px;
      overflow: auto;
      display: none;
    }
    @media (max-width: 760px) {
      .steps { grid-template-columns: 1fr; }
      .group-head { flex-direction: column; }
      .group-actions { width: 100%; }
      .group-actions button { flex: 1; }
      .item { margin: 10px; padding: 13px; }
    }
  </style>
</head>
<body>
  <header>
    <h1 id="page-title">Blindspot Ledger Triage</h1>
    <p id="page-subtitle"></p>
  </header>
  <main>
    <section class="steps" aria-label="Steps">
      <div class="step"><strong id="step-read-title"></strong><span id="step-read"></span></div>
      <div class="step"><strong id="step-choose-title"></strong><span id="step-choose"></span></div>
      <div class="step"><strong id="step-submit-title"></strong><span id="step-submit"></span></div>
    </section>
    <section class="summary">
      <div><strong id="project-label"></strong>: <span id="project-name"></span></div>
      <div><strong id="ledger-label"></strong>: <code id="ledger-path"></code></div>
      <div id="progress-text"></div>
      <div class="progressbar" aria-hidden="true"><div id="progress-fill"></div></div>
      <div class="hint" id="partial-hint"></div>
    </section>
    <div id="groups"></div>
    <section class="submit-panel">
      <strong id="submit-title"></strong>
      <span class="status" id="submit-status"></span>
      <div>
        <button class="primary" id="submit-button" type="button"></button>
        <button id="copy-button" type="button"></button>
        <button id="show-button" type="button"></button>
      </div>
      <pre id="response-preview"></pre>
    </section>
  </main>

        risks: { now: "现在", next: "下一步", later: "稍后", watch: "观察", low: "低", medium: "中", high: "高" },
        executionKinds: { ledger_only: "只整理台账", cheap_verification: "简单确认后整理", external_confirmation: "需要外部或官方确认", owner_followup: "需要用户补充判断", implementation_plan: "需要计划或实现工作" },
        actions: { accept: "按推荐记录", defer: "以后再决定", resolved_candidate: "可能已解决", reject: "不适用/拒绝", keep_pending: "保持打开", needs_reexplain: "重新解释" }
      },
      es: {
        subtitle: "Entiende cada elemento en esta página y elige solo lo que quieres procesar. Lo no seleccionado queda igual.",
        projectLabel: "Proyecto",

        groupApply: "Seleccionar recomendaciones del grupo",
        itemsNoun: "elementos",
        ledgerSummaryLabel: "Elemento del ledger",
        explanationLabel: "Explicación para entender este elemento",
        whyLabel: "Por qué importa ahora",
        decisionQuestionLabel: "Decisión a tomar",
        notePlaceholder: "Agrega una nota si hace falta contexto. Puedes dejarlo vacío.",
        submitTitle: "Enviar decisiones seleccionadas",
        selectedLabel: "seleccionados",

        chooseAny: "Elige al menos un elemento antes de enviar.",
        ready: "Puedes enviar los elementos seleccionados.",
        missing: "Todavía no hay elementos seleccionados.",
        submitButton: "Enviar respuesta",
        copyButton: "Copiar JSON",
        showButton: "Ver JSON",
        saved: "La respuesta se guardó automáticamente en la carpeta del board. Dile al agente que las respuestas están listas.",
        downloaded: "El guardado en servidor falló, así que se descargó el response JSON. Déjalo en Descargas y dile al agente que las respuestas están listas.",
        copied: "response JSON copiado.",
        clipboardBlocked: "El portapapeles está bloqueado. Copia desde la vista previa.",
        recommended: "Recomendado",
        statusLabel: "Estado actual",
        awarenessLabel: "Conocimiento",
        riskLabel: "Prioridad",
        recommendLabel: "Manejo recomendado",
        effectLabel: "Despues de elegir",
        categories: {
          quick_cleanup: "Limpieza rapida",
          safe_accept: "Se puede rastrear si se aprueba",
          decision_bundle: "Decision agrupada",
          needs_owner_detail: "Necesita criterio del dueno",
          needs_external_confirmation: "Necesita confirmacion externa",
          needs_reexplain: "Necesita explicacion mas clara"
        },
        statuses: { pending: "Pendiente", accepted: "Aceptado", deferred: "Diferido", rejected: "Rechazado", resolved: "Resuelto" },
        awareness: { unknown_unknown: "Nuevo para ti", unknown_known: "Conocido pero no documentado", deliberate_skip: "Omitido a propósito", unconfirmed: "Sin confirmar", "sin confirmar": "Sin confirmar" },
        risks: { now: "Ahora", next: "Siguiente", later: "Luego", watch: "Observar", low: "Baja", medium: "Media", high: "Alta" },
        executionKinds: { ledger_only: "Solo ordenar el ledger", cheap_verification: "Verificacion simple antes de ordenar", external_confirmation: "Necesita confirmacion externa u oficial", owner_followup: "Necesita criterio adicional del dueno", implementation_plan: "Necesita plan o implementacion" },
        actions: { accept: "Registrar recomendación", defer: "Decidir después", resolved_candidate: "Parece resuelto", reject: "No aplica/rechazar", keep_pending: "Dejar abierto", needs_reexplain: "Pedir explicación clara" }
      }
    };

    function languageKey(value) {
      const lang = String(value || "").toLowerCase();
      if (lang.startsWith("ko")) return "ko";
      if (lang.startsWith("ja")) return "ja";
      if (lang.startsWith("zh")) return "zh";
      if (lang.startsWith("es")) return "es";
      return "en";
    }
    const langKey = languageKey(data.language);
    const copy = UI_COPY[langKey] || UI_COPY.en;
    const selected = new Map();

    function esc(value) {
      return String(value == null ? "" : value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }
    function local(map, value) {
      const text = String(value || "");
      return map[text] || text || "-";
    }
    function actionLabel(value) { return local(copy.actions, value); }
    function statusLabel(value) { return local(copy.statuses, value); }
    function awarenessLabel(value) { return local(copy.awareness, value); }
    function riskLabel(value) { return local(copy.risks, value); }
    function categoryLabel(value) { return local(copy.categories || {}, value); }
    function executionKindLabel(value) { return local(copy.executionKinds || {}, value || "ledger_only"); }
    function optionList(item) { return Array.isArray(item.options) ? item.options : []; }
    function allItems() { return (data.groups || []).flatMap(group => group.items || []); }
    function selectedOption(item) {
      const action = selected.get(item.ledgerId);
      return optionList(item).find(opt => opt.action === action) || null;
    }
    function optionEffectKind(item, action) {
      if (action === "accept") return item.executionKind || "ledger_only";
      if (action === "resolved_candidate") return "cheap_verification";
      if (action === "needs_reexplain") return "owner_followup";
      return "ledger_only";
    }

    function render() {
      document.documentElement.lang = langKey;
      document.getElementById("page-title").textContent = data.title || "Blindspot Ledger Triage";
      document.getElementById("page-subtitle").textContent = copy.subtitle;
      document.getElementById("project-label").textContent = copy.projectLabel;
      document.getElementById("ledger-label").textContent = copy.ledgerLabel;
      document.getElementById("step-read-title").textContent = copy.stepReadTitle;
      document.getElementById("step-read").textContent = copy.stepRead;
      document.getElementById("step-choose-title").textContent = copy.stepChooseTitle;
      document.getElementById("step-choose").textContent = copy.stepChoose;
      document.getElementById("step-submit-title").textContent = copy.stepSubmitTitle;
      document.getElementById("step-submit").textContent = copy.stepSubmit;
      document.getElementById("partial-hint").textContent = copy.partialHint;
      document.getElementById("submit-title").textContent = copy.submitTitle;
      document.getElementById("submit-button").textContent = copy.submitButton;
      document.getElementById("copy-button").textContent = copy.copyButton;
      document.getElementById("show-button").textContent = copy.showButton;
      document.getElementById("project-name").textContent = data.projectName || data.projectRoot || "";
      document.getElementById("ledger-path").textContent = data.ledgerPath || "";

      const root = document.getElementById("groups");
      root.innerHTML = "";
      for (const group of data.groups || []) {
        const section = document.createElement("section");
        section.className = "group";
        const groupItems = group.items || [];
        section.innerHTML = `
          <div class="group-head">
            <div>
              <h2 class="group-title">${esc(group.title || group.groupId)}</h2>
              <p class="group-summary">${esc(group.plainSummary || "")}</p>
              <div class="badges">
                <span class="badge">${esc(categoryLabel(group.category || "decision_bundle"))}</span>
                <span class="badge">${groupItems.length} ${esc(copy.itemsNoun)}</span>
              </div>
            </div>
            <div class="group-actions">
              <button type="button" data-apply-group="${esc(group.groupId)}">${esc(copy.groupApply)}</button>
            </div>
          </div>
          <div class="group-body"></div>
        `;
        const body = section.querySelector(".group-body");
        for (const item of groupItems) body.appendChild(renderItem(item));
        root.appendChild(section);
      }
      root.addEventListener("click", event => {
        const btn = event.target.closest("[data-apply-group]");
        if (!btn) return;
        const group = (data.groups || []).find(entry => entry.groupId === btn.dataset.applyGroup);
        if (!group) return;
        for (const item of group.items || []) {
          setChoice(item.ledgerId, item.recommendedAction || "keep_pending", true);
        }
        updateProgress();
      });
      updateProgress();
    }

    function renderItem(item) {
      const article = document.createElement("article");
      article.className = "item";
      const opts = optionList(item);
      const decisionQuestion = item.decisionQuestion || copy.decisionQuestionLabel;
      article.innerHTML = `
        <h3>${esc(item.shortTitle || item.ledgerId)}</h3>
        <div class="ledger-location">${esc(item.ledgerLocation || item.ledgerId)}</div>
        <div class="badges">
          <span class="badge">${esc(item.ledgerId)}</span>
          ${item.risk ? `<span class="badge">${esc(copy.riskLabel)}: ${esc(riskLabel(item.risk))}</span>` : ""}
          <span class="badge">${esc(copy.statusLabel)}: ${esc(statusLabel(item.currentStatus))}</span>
          <span class="badge">${esc(copy.awarenessLabel)}: ${esc(awarenessLabel(item.currentAwareness))}</span>
          <span class="badge recommend">${esc(copy.recommendLabel)}: ${esc(actionLabel(item.recommendedAction || "keep_pending"))}</span>
        </div>
        <div class="block ledger"><strong>${esc(copy.ledgerSummaryLabel)}</strong>${esc(item.ledgerSummary || item.shortTitle || "")}</div>
        <div class="block"><strong>${esc(copy.explanationLabel)}</strong>${esc(item.plainExplanation || "")}</div>
        <div class="block why"><strong>${esc(copy.whyLabel)}</strong>${esc(item.whyItMatters || "")}</div>
        <div class="decision-question">${esc(copy.decisionQuestionLabel)}: ${esc(decisionQuestion)}</div>
        <div class="options" role="radiogroup" aria-label="${esc(item.ledgerId)} options"></div>
        <textarea data-note="${esc(item.ledgerId)}" placeholder="${esc(copy.notePlaceholder)}"></textarea>
      `;
      const wrap = article.querySelector(".options");
      for (const opt of opts) {
        const action = opt.action;
        const id = `${item.ledgerId}-${action}`;
        const label = opt.label || actionLabel(action);
        const tradeoff = opt.tradeoff || "";
        const effect = executionKindLabel(optionEffectKind(item, action));
        const row = document.createElement("label");
        row.className = "option";
        row.dataset.ledgerId = item.ledgerId;
        row.dataset.action = action;
        row.innerHTML = `
          <input type="radio" name="${esc(item.ledgerId)}" id="${esc(id)}" value="${esc(action)}">
          <span>
            <span class="option-title">${esc(label)}${opt.recommended ? ` <span class="recommended-pill">${esc(copy.recommended)}</span>` : ""}<span class="effect-pill">${esc(copy.effectLabel)}: ${esc(effect)}</span></span>
            <p>${esc(tradeoff)}</p>
          </span>
        `;
        row.addEventListener("click", () => {
          setChoice(item.ledgerId, action, false);
          updateProgress();
        });
        wrap.appendChild(row);
      }
      return article;
    }

    function setChoice(ledgerId, action, updateRadio) {
      selected.set(ledgerId, action);
      document.querySelectorAll(`.option[data-ledger-id="${CSS.escape(ledgerId)}"]`).forEach(el => {
        const isSelected = el.dataset.action === action;
        el.classList.toggle("selected", isSelected);
        if (updateRadio) {
          const input = el.querySelector("input");
          if (input) input.checked = isSelected;
        }
      });
    }

    function buildPayload() {
      const decisions = allItems()
        .filter(item => selected.has(item.ledgerId))
        .map(item => {
          const noteEl = document.querySelector(`textarea[data-note="${CSS.escape(item.ledgerId)}"]`);
          const option = selectedOption(item) || {};
          return {
            ledgerId: item.ledgerId,
            action: selected.get(item.ledgerId),
            awareness: item.responseAwareness || item.currentAwareness || "unconfirmed",
            status: option.status || "",
            intentDetail: option.intentDetail || "",
            note: noteEl ? noteEl.value.trim() : ""
          };
        });
      return {
        schema: "blindspot-triage-response.v1",
        boardId: data.boardId,
        ledgerPath: data.ledgerPath,
        ledgerHash: data.ledgerHash,
        completedAt: new Date().toISOString(),
        decisions
      };
    }

    function safeDownloadToken(value) {
      const cleaned = String(value || "board").replace(/[^A-Za-z0-9_.-]+/g, "-").replace(/^-+|-+$/g, "");
      return (cleaned || "board").slice(0, 80);
    }

    function updateProgress() {
      const total = allItems().length;
      const done = selected.size;
      document.getElementById("progress-text").textContent = `${done} / ${total} ${copy.selectedLabel}`;
      document.getElementById("progress-fill").style.width = total ? `${(done / total) * 100}%` : "0%";
      const status = document.getElementById("submit-status");
      if (done > 0) {
        status.textContent = copy.ready;
        status.className = "status good";
      } else {
        status.textContent = copy.chooseAny;
        status.className = "status";
      }
    }

    async function submitResponse() {
      if (selected.size === 0) {
        document.getElementById("submit-status").textContent = copy.missing;
        document.getElementById("submit-status").className = "status bad";
        return;
      }
      const json = JSON.stringify(buildPayload(), null, 2);
      try {
        const res = await fetch("/api/triage-response", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: json
        });
        if (!res.ok) throw new Error("server rejected response");
        document.getElementById("submit-status").textContent = copy.saved;
        document.getElementById("submit-status").className = "status good";
      } catch {
        const blob = new Blob([json], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `blindspot-triage-response-${safeDownloadToken(data.boardId)}.json`;
        a.click();
        URL.revokeObjectURL(url);
        document.getElementById("submit-status").textContent = copy.downloaded;
        document.getElementById("submit-status").className = "status good";
      }
    }

    async function copyResponse() {
      const json = JSON.stringify(buildPayload(), null, 2);
      try {
        await navigator.clipboard.writeText(json);
        document.getElementById("submit-status").textContent = copy.copied;
        document.getElementById("submit-status").className = "status good";
      } catch {
        const pre = document.getElementById("response-preview");
        pre.textContent = json;
        pre.style.display = "block";
        document.getElementById("submit-status").textContent = copy.clipboardBlocked;
      }
    }

    document.getElementById("submit-button").addEventListener("click", submitResponse);
    document.getElementById("copy-button").addEventListener("click", copyResponse);
    document.getElementById("show-button").addEventListener("click", () => {
      const pre = document.getElementById("response-preview");
      pre.textContent = JSON.stringify(buildPayload(), null, 2);
      pre.style.display = pre.style.display === "block" ? "none" : "block";
    });
    render();
  </script>
</body>
