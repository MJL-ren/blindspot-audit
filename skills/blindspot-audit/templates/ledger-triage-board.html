<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blindspot Ledger Triage</title>
  <style>
:root {
  --bg: #0f0e2e;
  --stage: #f7f5ee;
  --panel: #ffffff;
  --ink: #1a1930;
  --muted: #4b4a67;
  --soft: #86859e;
  --line: rgba(15, 14, 46, 0.10);
  --line-strong: rgba(15, 14, 46, 0.18);
  --accent: #f5b800;
  --accent-strong: #d99c00;
  --accent-soft: #fef3c7;
  --purple: #6b3fe7;
  --purple-soft: #ede7fe;
  --cyan: #06b6d4;
  --cyan-soft: #e0f2fe;
  --green: #4caf7d;
  --green-soft: #e5f3ec;
  --danger: #c0453d;
  --danger-soft: #fce5e7;
  --ok: #2f855a;
  --amber: #f5b800;
  --amber-soft: #fef3c7;
  --blue: #6b3fe7;
  --blue-soft: #ede7fe;
  --radius: 16px;
  --shadow: 0 1px 3px rgba(20, 20, 50, 0.05), 0 16px 34px rgba(20, 20, 50, 0.08);
  font-family: Manrope, "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100vh;
  background: var(--bg);
  color: var(--ink);
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
body::before {
  content: "";
  position: fixed;
  inset: 92px 0 0;
  z-index: -1;
  background: var(--stage);
  border-radius: 24px 24px 0 0;
}
header {
  background: var(--bg);
  color: #e7e4ff;
  padding: 24px clamp(20px, 4vw, 52px) 28px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.06);
}
header h1 {
  margin: 0 0 7px;
  max-width: 980px;
  font-family: "Segoe UI", system-ui, sans-serif;
  font-size: clamp(28px, 4vw, 48px);
  font-weight: 800;
  line-height: 1.02;
  letter-spacing: 0;
  color: #ffffff;
}
header p {
  max-width: 980px;
  margin: 0;
  color: #b5b3d6;
  font-size: 15px;
}
main {
  max-width: 1200px;
  margin: 0 auto;
  padding: 26px clamp(14px, 3vw, 36px) 52px;
  background: var(--stage);
  border-radius: 24px 24px 0 0;
}
.steps {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 14px;
  margin-bottom: 18px;
}
.step,
.summary,
.group,
.item,
.submit-panel {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}
.step {
  padding: 16px;
}
.step strong {
  display: block;
  margin-bottom: 4px;
  color: var(--ink);
  font-weight: 800;
}
.step span,
.hint,
.group-summary,
.option p {
  color: var(--muted);
}
.summary {
  display: grid;
  gap: 9px;
  margin-bottom: 20px;
  padding: 18px;
}
.progressbar {
  height: 12px;
  overflow: hidden;
  border-radius: 999px;
  background: #e6e4da;
}
.progressbar > div {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--accent), var(--purple));
  transition: width 0.2s ease;
}
.group {
  margin: 20px 0;
  overflow: hidden;
  border-radius: 20px;
}
.group-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  padding: 18px;
  border-bottom: 1px solid var(--line);
  background: #ffffff;
}
.group-title {
  margin: 0 0 5px;
  font-size: 22px;
  font-weight: 800;
  letter-spacing: 0;
}
.group-summary {
  max-width: 820px;
  margin: 0;
}
.group-actions {
  display: flex;
  flex: 0 0 auto;
  gap: 8px;
}
button {
  border: 1px solid var(--line);
  background: #ffffff;
  color: var(--ink);
  border-radius: 12px;
  padding: 9px 14px;
  cursor: pointer;
  font: inherit;
  font-weight: 800;
}
button.primary {
  background: var(--accent);
  color: var(--ink);
  border-color: var(--accent);
  box-shadow: 0 10px 22px rgba(245, 184, 0, 0.26);
}
button:hover { filter: brightness(0.985); }
.item {
  margin: 15px;
  padding: 18px;
  box-shadow: none;
  border-radius: 18px;
}
.item + .item { margin-top: 18px; }
.item h3 {
  margin: 0 0 7px;
  font-size: clamp(20px, 2.2vw, 28px);
  font-weight: 800;
  line-height: 1.14;
  letter-spacing: 0;
}
.ledger-location {
  color: var(--soft);
  font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
  font-size: 12px;
  margin: -2px 0 11px;
}
.badges {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
  margin: 9px 0 13px;
}
.badge {
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 5px 10px;
  color: var(--soft);
  font-size: 12.5px;
  background: #f8f7f2;
}
.badge.recommend {
  color: #5c4a0a;
  background: var(--accent-soft);
  border-color: rgba(245, 184, 0, 0.35);
}
.block {
  border-radius: 14px;
  padding: 13px 14px;
  margin: 10px 0;
  border-left: 4px solid var(--cyan);
  background: var(--cyan-soft);
  color: #075a69;
}
.block.ledger {
  border-color: var(--purple);
  background: var(--purple-soft);
  color: #37217a;
}
.block.why {
  border-color: var(--amber);
  background: var(--amber-soft);
  color: #5c4a0a;
}
.block strong {
  display: block;
  margin-bottom: 4px;
  color: var(--ink);
}
.decision-question {
  margin: 13px 0 9px;
  padding: 12px 14px;
  border: 1px solid var(--line);
  border-radius: 14px;
  background: #f5f3ee;
  font-weight: 800;
}
.options {
  display: grid;
  gap: 11px;
  margin-top: 10px;
}
.option {
  display: grid;
  grid-template-columns: 24px minmax(0, 1fr);
  gap: 12px;
  align-items: start;
  border: 2px solid transparent;
  outline: 1px solid var(--line);
  border-radius: 18px;
  padding: 14px;
  background: #ffffff;
  cursor: pointer;
  transition: border-color 0.16s ease, background 0.16s ease, box-shadow 0.16s ease, outline-color 0.16s ease;
}
.option:hover {
  outline-color: rgba(107, 63, 231, 0.28);
  box-shadow: 0 12px 28px rgba(20, 20, 50, 0.08);
}
.option input {
  margin-top: 5px;
  width: 18px;
  height: 18px;
  accent-color: var(--purple);
}
.option-title {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
  font-weight: 850;
  font-size: 17px;
}
.recommended-pill,
.effect-pill {
  border-radius: 999px;
  padding: 2px 9px;
  font-size: 12px;
  font-weight: 800;
}
.recommended-pill {
  color: #5c4a0a;
  background: var(--accent-soft);
  border: 1px solid rgba(245, 184, 0, 0.34);
}
.effect-pill {
  color: #075a69;
  background: var(--cyan-soft);
  border: 1px solid rgba(6, 182, 212, 0.24);
}
.option p {
  margin: 7px 0 0;
}
.option.selected {
  outline-color: transparent;
  border-color: var(--purple);
  background: linear-gradient(180deg, #f8f5ff, #ffffff);
}
textarea {
  width: 100%;
  min-height: 78px;
  margin-top: 12px;
  padding: 11px 12px;
  resize: vertical;
  border-radius: 14px;
  border: 1px solid var(--line);
  font: inherit;
  background: #ffffff;
}
.item.needs-note textarea {
  border-color: var(--danger);
  box-shadow: 0 0 0 3px rgba(192, 69, 61, 0.12);
}
.submit-panel {
  display: grid;
  gap: 10px;
  margin-top: 24px;
  padding: 18px;
  border-radius: 20px;
}
.status { color: var(--muted); }
.status.good { color: var(--ok); }
.status.bad { color: var(--danger); }
pre {
  display: none;
  max-height: 260px;
  overflow: auto;
  padding: 12px;
  border-radius: 14px;
  background: var(--bg);
  color: #e7e4ff;
  white-space: pre-wrap;
  word-break: break-word;
}
@media (max-width: 760px) {
  body::before { inset-top: 128px; }
  .steps { grid-template-columns: 1fr; }
  .group-head { flex-direction: column; }
  .group-actions { width: 100%; }
  .group-actions button { flex: 1; }
  .item { margin: 10px; padding: 14px; }
}

header {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr) auto;
  gap: 12px 24px;
  align-items: center;
}
header h1 {
  display: flex;
  align-items: center;
  gap: 14px;
}
header h1::before {
  content: "";
  width: 46px;
  height: 46px;
  flex: 0 0 auto;
  border-radius: 12px;
  background:
    linear-gradient(45deg, transparent 45%, #0f0e2e 45% 55%, transparent 55%),
    linear-gradient(-45deg, transparent 45%, #0f0e2e 45% 55%, transparent 55%),
    linear-gradient(135deg, #f5b800 0%, #f59e0b 100%);
  box-shadow: 0 4px 14px rgba(245, 184, 0, 0.35), inset 0 -2px 6px rgba(0, 0, 0, 0.15);
}
header p {
  grid-column: 2 / 3;
}
.summary {
  border: 0;
  outline: 1px solid var(--line);
}
.steps {
  grid-template-columns: repeat(3, minmax(0, 1fr));
}
.step {
  border-radius: 18px;
  border: 0;
  outline: 1px solid var(--line);
  border-top: 5px solid var(--accent);
}
.step:nth-child(2) {
  border-top-color: var(--purple);
}
.step:nth-child(3) {
  border-top-color: var(--cyan);
}
.group {
  border: 0;
  outline: 1px solid var(--line);
}
.group-head {
  background: linear-gradient(180deg, #ffffff, #faf9f5);
}
.group-title::before {
  content: "";
  display: inline-block;
  width: 10px;
  height: 10px;
  margin-right: 10px;
  border-radius: 3px;
  background: var(--accent);
  transform: rotate(45deg) translateY(-1px);
}
.item {
  border: 0;
  outline: 1px solid var(--line);
}
.block {
  border-left-width: 0;
  border-radius: 16px;
  outline: 1px solid rgba(6, 182, 212, 0.16);
}
.block.ledger {
  outline-color: rgba(107, 63, 231, 0.16);
}
.block.why {
  outline-color: rgba(245, 184, 0, 0.26);
}
.options {
  grid-template-columns: repeat(2, minmax(0, 1fr));
}
.option {
  min-height: 134px;
  align-content: start;
  position: relative;
}
.option::after {
  content: "";
  position: absolute;
  top: 12px;
  right: 12px;
  width: 10px;
  height: 10px;
  border-radius: 3px;
  background: #d7d5e6;
  transform: rotate(45deg);
}
.option.selected::after {
  background: var(--purple);
  box-shadow: 0 0 0 5px rgba(107, 63, 231, 0.12);
}
.option.selected {
  box-shadow: 0 14px 30px rgba(20, 20, 50, 0.10);
}
.submit-panel {
  border: 0;
  outline: 1px solid var(--line);
  border-top: 5px solid var(--accent);
}
@media (max-width: 980px) {
  header {
    grid-template-columns: 1fr;
  }
  header p,
  .options { grid-template-columns: 1fr; }
}
</style>
</head>

    function languageKey(value) {
      const lang = String(value || "").toLowerCase();
      if (lang.startsWith("ko")) return "ko";
      if (lang.startsWith("ja")) return "ja";
      if (lang.startsWith("zh")) return "zh";
      if (lang.startsWith("es")) return "es";
      return "en";
    }
    const langKey = languageKey(data.language);
    const copy = UI_COPY[langKey] || UI_COPY.en;
    const selected = new Map();

    function esc(value) {
      return String(value == null ? "" : value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }
    function local(map, value) {
      const text = String(value || "");
      return map[text] || text || "-";
    }
    function actionLabel(value) { return local(copy.actions, value); }
    function statusLabel(value) { return local(copy.statuses, value); }
    function awarenessLabel(value) { return local(copy.awareness, value); }
    function riskLabel(value) { return local(copy.risks, value); }
    function categoryLabel(value) { return local(copy.categories || {}, value); }
    function executionKindLabel(value) { return local(copy.executionKinds || {}, value || "ledger_only"); }
    function optionList(item) { return Array.isArray(item.options) ? item.options : []; }
    function allItems() { return (data.groups || []).flatMap(group => group.items || []); }
    function selectedOption(item) {
      const optionId = selected.get(item.ledgerId);
      return optionList(item).find(opt => opt.optionId === optionId) || null;
    }
    function recommendedOptionId(item) {
      const recommended = optionList(item).find(opt => opt.recommended)
        || optionList(item).find(opt => opt.action === (item.recommendedAction || "keep_pending"))
        || optionList(item)[0];
      return recommended ? recommended.optionId : "";
    }
    function optionEffectKind(item, action) {
      if (action === "accept") return item.executionKind || "ledger_only";
      if (action === "resolved_candidate") return "cheap_verification";
      if (action === "needs_reexplain") return "owner_followup";
      return "ledger_only";
    }
    function optionNeedsNote(item, option) {
      if (!option || option.action !== "resolved_candidate") return false;
      if (Object.prototype.hasOwnProperty.call(option, "noteRequired")) {
        return Boolean(option.noteRequired);
      }
      const executionKind = item.executionKind || "ledger_only";
      return executionKind === "external_confirmation"
        || executionKind === "owner_followup"
        || (Array.isArray(item.secretChecklist) && item.secretChecklist.length > 0);
    }
    function noteElement(item) {
      const ledgerId = String(item && item.ledgerId ? item.ledgerId : "");
      return Array.from(document.querySelectorAll("textarea[data-note]"))
        .find(el => el.dataset.note === ledgerId) || null;
    }
    function optionElementsFor(ledgerId) {
      const id = String(ledgerId || "");
      return Array.from(document.querySelectorAll(".option[data-ledger-id]"))
        .filter(el => el.dataset.ledgerId === id);
    }
    function noteText(item) {
      const el = noteElement(item);
      return el ? el.value.trim() : "";
    }
    function missingResolvedNotes() {
      return allItems().filter(item => {
        if (!selected.has(item.ledgerId)) return false;
        const option = selectedOption(item);
        return optionNeedsNote(item, option) && !noteText(item);
      });
    }
    function showMissingResolvedNotes(items) {
      const ids = items.map(item => `${item.ledgerId} (${item.shortTitle || item.ledgerId})`).join(", ");
      const status = document.getElementById("submit-status");
      status.textContent = copy.resolvedNoteRequired.replace("{ids}", ids);
      status.className = "status bad";
      const first = items[0];
      if (first) {
        const el = noteElement(first);
        if (el) {
          el.focus();
          el.scrollIntoView({ block: "center" });
        }
      }
    }
    function ensureCanBuildPayload() {
      if (selected.size === 0) {
        document.getElementById("submit-status").textContent = copy.missing;
        document.getElementById("submit-status").className = "status bad";
        return false;
      }
      const missingNotes = missingResolvedNotes();
      if (missingNotes.length) {
        showMissingResolvedNotes(missingNotes);
        return false;
      }
      return true;
    }
    function refreshNoteState() {
      document.querySelectorAll(".item").forEach(article => {
        const note = article.querySelector("textarea[data-note]");
        if (!note) return;
        const articleLedgerId = note.dataset.note;
        const articleItem = allItems().find(entry => entry.ledgerId === articleLedgerId);
        const option = articleItem ? selectedOption(articleItem) : null;
        article.classList.toggle(
          "needs-note",
          Boolean(optionNeedsNote(articleItem, option) && !note.value.trim())
        );
      });
    }

    function render() {
      document.documentElement.lang = langKey;
      document.getElementById("page-title").textContent = data.title || "Blindspot Ledger Triage";
      document.getElementById("page-subtitle").textContent = copy.subtitle;
      document.getElementById("project-label").textContent = copy.projectLabel;
      document.getElementById("ledger-label").textContent = copy.ledgerLabel;
      document.getElementById("step-read-title").textContent = copy.stepReadTitle;
      document.getElementById("step-read").textContent = copy.stepRead;
      document.getElementById("step-choose-title").textContent = copy.stepChooseTitle;
      document.getElementById("step-choose").textContent = copy.stepChoose;
      document.getElementById("step-submit-title").textContent = copy.stepSubmitTitle;
      document.getElementById("step-submit").textContent = copy.stepSubmit;
      document.getElementById("partial-hint").textContent = copy.partialHint;
      document.getElementById("submit-title").textContent = copy.submitTitle;
      document.getElementById("submit-button").textContent = copy.submitButton;
      document.getElementById("copy-button").textContent = copy.copyButton;
      document.getElementById("show-button").textContent = copy.showButton;
      document.getElementById("project-name").textContent = data.projectName || data.projectRoot || "";
      document.getElementById("ledger-path").textContent = data.ledgerPath || "";

      const root = document.getElementById("groups");
      root.innerHTML = "";
      for (const group of data.groups || []) {
        const section = document.createElement("section");
        section.className = "group";
        const groupItems = group.items || [];
        section.innerHTML = `
          <div class="group-head">
            <div>
              <h2 class="group-title">${esc(group.title || group.groupId)}</h2>
              <p class="group-summary">${esc(group.plainSummary || "")}</p>
              <div class="badges">
                <span class="badge">${esc(categoryLabel(group.category || "decision_bundle"))}</span>
                <span class="badge">${groupItems.length} ${esc(copy.itemsNoun)}</span>
              </div>
            </div>
            <div class="group-actions">
              <button type="button" data-apply-group="${esc(group.groupId)}">${esc(copy.groupApply)}</button>
            </div>
          </div>
          <div class="group-body"></div>
        `;
        const body = section.querySelector(".group-body");
        for (const item of groupItems) body.appendChild(renderItem(item));
        root.appendChild(section);
      }
      root.addEventListener("click", event => {
        const btn = event.target.closest("[data-apply-group]");
        if (!btn) return;
        const group = (data.groups || []).find(entry => entry.groupId === btn.dataset.applyGroup);
        if (!group) return;
        for (const item of group.items || []) {
          const optionId = recommendedOptionId(item);
          if (optionId) setChoice(item.ledgerId, optionId, true);
        }
        updateProgress();
      });
      updateProgress();
    }

    function renderItem(item) {
      const article = document.createElement("article");
      article.className = "item";
      const opts = optionList(item);
      const decisionQuestion = item.decisionQuestion || copy.decisionQuestionLabel;
      article.innerHTML = `
        <h3>${esc(item.shortTitle || item.ledgerId)}</h3>
        <div class="ledger-location">${esc(item.ledgerLocation || item.ledgerId)}</div>
        <div class="badges">
          <span class="badge">${esc(item.ledgerId)}</span>
          ${item.risk ? `<span class="badge">${esc(copy.riskLabel)}: ${esc(riskLabel(item.risk))}</span>` : ""}
          <span class="badge">${esc(copy.statusLabel)}: ${esc(statusLabel(item.currentStatus))}</span>
          <span class="badge">${esc(copy.awarenessLabel)}: ${esc(awarenessLabel(item.currentAwareness))}</span>
          <span class="badge recommend">${esc(copy.recommendLabel)}: ${esc(actionLabel(item.recommendedAction || "keep_pending"))}</span>
        </div>
        <div class="block ledger"><strong>${esc(copy.ledgerSummaryLabel)}</strong>${esc(item.ledgerSummary || item.shortTitle || "")}</div>
        <div class="block"><strong>${esc(copy.explanationLabel)}</strong>${esc(item.plainExplanation || "")}</div>
        <div class="block why"><strong>${esc(copy.whyLabel)}</strong>${esc(item.whyItMatters || "")}</div>
        <div class="decision-question">${esc(copy.decisionQuestionLabel)}: ${esc(decisionQuestion)}</div>
        <div class="options" role="radiogroup" aria-label="${esc(item.ledgerId)} options"></div>
        <textarea data-note="${esc(item.ledgerId)}" placeholder="${esc(copy.notePlaceholder)}"></textarea>
      `;
      const wrap = article.querySelector(".options");
      const textarea = article.querySelector("textarea");
      if (textarea) textarea.addEventListener("input", updateProgress);
      for (const opt of opts) {
        const action = opt.action;
        const optionId = opt.optionId || action;
        const id = `${item.ledgerId}-${optionId}`;
        const label = opt.label || actionLabel(action);
        const tradeoff = opt.tradeoff || "";
        const effect = executionKindLabel(optionEffectKind(item, action));
        const row = document.createElement("label");
        row.className = "option";
        row.dataset.ledgerId = item.ledgerId;
        row.dataset.optionId = optionId;
        row.innerHTML = `
          <input type="radio" name="${esc(item.ledgerId)}" id="${esc(id)}" value="${esc(optionId)}">
          <span>
            <span class="option-title">${esc(label)}${opt.recommended ? ` <span class="recommended-pill">${esc(copy.recommended)}</span>` : ""}<span class="effect-pill">${esc(copy.effectLabel)}: ${esc(effect)}</span></span>
            <p>${esc(tradeoff)}</p>
          </span>
        `;
        row.addEventListener("click", () => {
          setChoice(item.ledgerId, optionId, false);
          updateProgress();
        });
        wrap.appendChild(row);
      }
      return article;
    }

    function setChoice(ledgerId, optionId, updateRadio) {
      selected.set(ledgerId, optionId);
      const item = allItems().find(entry => entry.ledgerId === ledgerId);
      const selectedOptionForItem = item ? optionList(item).find(opt => opt.optionId === optionId) : null;
      const noteEl = item ? noteElement(item) : null;
      if (noteEl) {
        const needsNote = optionNeedsNote(item, selectedOptionForItem);
        noteEl.required = Boolean(needsNote);
        noteEl.placeholder = needsNote ? copy.resolvedNotePlaceholder : copy.notePlaceholder;
      }
      optionElementsFor(ledgerId).forEach(el => {
        const isSelected = el.dataset.optionId === optionId;
        el.classList.toggle("selected", isSelected);
        if (updateRadio) {
          const input = el.querySelector("input");
          if (input) input.checked = isSelected;
        }
      });
      refreshNoteState();
    }

    function buildPayload() {
      const decisions = allItems()
        .filter(item => selected.has(item.ledgerId))
        .map(item => {
          const noteEl = noteElement(item);
          const option = selectedOption(item) || {};
          return {
            ledgerId: item.ledgerId,
            optionId: option.optionId || selected.get(item.ledgerId),
            action: option.action || "",
            awareness: item.responseAwareness || item.currentAwareness || "unconfirmed",
            status: option.status || "",
            intentDetail: option.intentDetail || "",
            note: noteEl ? noteEl.value.trim() : ""
          };
        });
      return {
        schema: "blindspot-triage-response.v1",
        boardId: data.boardId,
        ledgerPath: data.ledgerPath,
        ledgerHash: data.ledgerHash,
        completedAt: new Date().toISOString(),
        decisions
      };
    }

    function safeDownloadToken(value) {
      const cleaned = String(value || "board").replace(/[^A-Za-z0-9_.-]+/g, "-").replace(/^-+|-+$/g, "");
      return (cleaned || "board").slice(0, 80);
    }

    function updateProgress() {
      refreshNoteState();
      const total = allItems().length;
      const done = selected.size;
      document.getElementById("progress-text").textContent = `${done} / ${total} ${copy.selectedLabel}`;
      document.getElementById("progress-fill").style.width = total ? `${(done / total) * 100}%` : "0%";
      const status = document.getElementById("submit-status");
      const missingNotes = missingResolvedNotes();
      if (done > 0 && missingNotes.length) {
        status.textContent = copy.resolvedNoteRequired.replace(
          "{ids}",
          missingNotes.map(item => `${item.ledgerId} (${item.shortTitle || item.ledgerId})`).join(", ")
        );
        status.className = "status bad";
      } else if (done > 0) {
        status.textContent = copy.ready;
        status.className = "status good";
      } else {
        status.textContent = copy.chooseAny;
        status.className = "status";
      }
    }

    async function submitResponse() {
      if (!ensureCanBuildPayload()) return;
      const json = JSON.stringify(buildPayload(), null, 2);
      try {
        const res = await fetch("/api/triage-response", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: json
        });
        if (!res.ok) throw new Error("server rejected response");
        document.getElementById("submit-status").textContent = copy.saved;
        document.getElementById("submit-status").className = "status good";
      } catch {
        const blob = new Blob([json], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `blindspot-triage-response-${safeDownloadToken(data.boardId)}.json`;
        a.click();
        URL.revokeObjectURL(url);
        document.getElementById("submit-status").textContent = copy.downloaded;
        document.getElementById("submit-status").className = "status good";
      }
    }

    async function copyResponse() {
      if (!ensureCanBuildPayload()) return;
      const json = JSON.stringify(buildPayload(), null, 2);
      try {
        await navigator.clipboard.writeText(json);
        document.getElementById("submit-status").textContent = copy.copied;
        document.getElementById("submit-status").className = "status good";
      } catch {
        const pre = document.getElementById("response-preview");
        pre.textContent = json;
        pre.style.display = "block";
        document.getElementById("submit-status").textContent = copy.clipboardBlocked;
      }
    }

    document.getElementById("submit-button").addEventListener("click", submitResponse);
    document.getElementById("copy-button").addEventListener("click", copyResponse);
    document.getElementById("show-button").addEventListener("click", () => {
      if (!ensureCanBuildPayload()) return;
      const pre = document.getElementById("response-preview");
      pre.textContent = JSON.stringify(buildPayload(), null, 2);
      pre.style.display = pre.style.display === "block" ? "none" : "block";
    });
    render();
  </script>
</body>
</html>
