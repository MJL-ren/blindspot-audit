<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="860" viewBox="0 0 1280 860" role="img" aria-labelledby="title desc">
  <title id="title">네 가지 미지 프레임</title>
  <desc id="desc">Known knowns, known unknowns, unknown knowns, unknown unknowns를 한국어 설명과 함께 네 개의 카드로 정리한 이미지</desc>
  <defs>
    <style>
      .bg { fill: #f5f2ea; }
      .card { fill: #fffdf8; stroke: #151515; stroke-width: 4; }
      .dark { fill: #151515; }
      .ink { fill: #151515; }
      .muted { fill: #716b62; }
      .accent { fill: #c96f4c; }
      .line { stroke: #151515; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .soft-line { stroke: #9d978d; stroke-width: 4; stroke-linecap: round; fill: none; }
      .dash { stroke: #151515; stroke-width: 4; stroke-linecap: round; stroke-dasharray: 10 14; fill: none; }
      text { font-family: "Pretendard", "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif; }
      .serif { font-family: "Georgia", "Noto Serif KR", serif; font-weight: 700; }
      .head { font-size: 44px; }
      .sub { font-size: 24px; }
      .body { font-size: 25px; }
      .darktext { fill: #fffdf8; }
      .darkmuted { fill: #d7d0c3; }
    </style>
  </defs>

  <rect class="bg" width="1280" height="860" rx="42"/>

  <g transform="translate(50 50)">
    <rect class="card" width="565" height="360" rx="26"/>
    <text class="serif head ink" x="48" y="80">Known knowns</text>
    <text class="sub muted" x="50" y="126">이미 알고 있고, 문서에도 적힌 것</text>
    <rect x="58" y="178" width="124" height="132" rx="14" fill="#fffdf8" stroke="#151515" stroke-width="4"/>
    <line class="line" x1="88" y1="216" x2="154" y2="216"/>
    <line class="soft-line" x1="88" y1="250" x2="154" y2="250"/>
    <line class="soft-line" x1="88" y1="282" x2="138" y2="282"/>
    <text class="body muted" x="230" y="222">README, TODO, 계획처럼</text>
    <text class="body muted" x="230" y="260">이미 드러난 정보.</text>
    <text class="body muted" x="230" y="298">보고서의 필터가 된다.</text>
  </g>

  <g transform="translate(665 50)">
    <rect class="card" width="565" height="360" rx="26"/>
    <text class="serif head ink" x="48" y="80">Known unknowns</text>
    <text class="sub muted" x="50" y="126">물어봐야 한다는 걸 아는 질문</text>
    <rect class="dash" x="58" y="176" width="124" height="132" rx="14"/>
    <text class="serif ink" x="102" y="260" font-size="72">?</text>
    <text class="body muted" x="230" y="222">아직 답은 없지만,</text>
    <text class="body muted" x="230" y="260">목록에는 올라와 있는 것.</text>
    <text class="body muted" x="230" y="298">긴 설명보다 추적이 필요하다.</text>
  </g>

  <g transform="translate(50 452)">
    <rect class="card" width="565" height="360" rx="26"/>
    <text class="serif head ink" x="48" y="80">Unknown knowns</text>
    <text class="sub muted" x="50" y="126">보면 알지만, 아직 적어두지 않은 것</text>
    <path class="line" d="M64 252 C98 196, 162 196, 204 252 C162 308, 98 308, 64 252 Z"/>
    <circle fill="#fffdf8" stroke="#151515" stroke-width="4" cx="134" cy="252" r="34"/>
    <circle class="accent" cx="134" cy="252" r="11"/>
    <text class="body muted" x="230" y="222">주인은 이미 감으로 아는데</text>
    <text class="body muted" x="230" y="260">문서에는 없는 결정.</text>
    <text class="body muted" x="230" y="298">처방은 구현보다 기록이다.</text>
  </g>

  <g transform="translate(665 452)">
    <rect class="dark" width="565" height="360" rx="26"/>
    <text class="serif head darktext" x="48" y="80">Unknown unknowns</text>
    <text class="sub darkmuted" x="50" y="126">생각해 보지 못한 구멍</text>
    <path class="soft-line" d="M62 226 C96 194, 130 194, 164 226"/>
    <path class="soft-line" d="M62 268 C96 236, 130 236, 164 268"/>
    <path class="soft-line" d="M62 310 C96 278, 130 278, 164 310"/>
    <text class="serif" fill="#c96f4c" x="206" y="270" font-size="70">?</text>
    <text class="body darkmuted" x="282" y="220">프로젝트 모양상</text>
    <text class="body darkmuted" x="282" y="258">있을 법한 함정인데,</text>
    <text class="body darkmuted" x="282" y="296">아직 질문으로도 안 나온 것.</text>
  </g>
</svg>
